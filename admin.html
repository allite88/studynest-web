<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Allite Admin</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: 'Segoe UI', system-ui, sans-serif; background:#f1f5f9; }
  .field { width:100%; border:1.5px solid #e2e8f0; border-radius:8px; padding:8px 10px; font-size:13px; outline:none; transition:border .15s; font-family:inherit; }
  .field:focus { border-color:#6366f1; }
  .tab-active { border-bottom:2px solid #6366f1; color:#6366f1; font-weight:600; }
  .tab-idle   { border-bottom:2px solid transparent; color:#94a3b8; }
  .tab-idle:hover { color:#64748b; }
  .sub-active { background:#eef2ff; color:#4f46e5; font-weight:600; }
  .sub-idle   { color:#64748b; }
  .sub-idle:hover { background:#f8fafc; }
  .toggle { position:relative; display:inline-block; width:40px; height:22px; }
  .toggle input { opacity:0; width:0; height:0; }
  .slider { position:absolute; inset:0; background:#cbd5e1; border-radius:22px; transition:.3s; cursor:pointer; }
  .slider:before { content:''; position:absolute; height:16px; width:16px; left:3px; top:3px; background:white; border-radius:50%; transition:.3s; }
  input:checked + .slider { background:#6366f1; }
  input:checked + .slider:before { transform:translateX(18px); }
  .badge-free    { background:#dcfce7; color:#15803d; }
  .badge-members { background:#fef3c7; color:#b45309; }
  .badge-active  { background:#dbeafe; color:#1d4ed8; }
  .badge-off     { background:#f1f5f9; color:#94a3b8; }
  .log-ok  { color:#15803d; } .log-err { color:#dc2626; } .log-info { color:#6366f1; }
  .log-line { font-size:11px; padding:1px 0; }
  .paste-zone { border:2px dashed #cbd5e1; border-radius:10px; padding:16px; text-align:center; cursor:pointer; transition:all .15s; }
  .paste-zone:hover { border-color:#6366f1; background:#eef2ff; }
  img.thumb { max-height:60px; border-radius:6px; object-fit:cover; border:1px solid #e2e8f0; }
  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:50; display:flex; align-items:center; justify-content:center; padding:16px; }
  .modal-box { background:white; border-radius:20px; width:100%; max-width:560px; max-height:90vh; overflow-y:auto; }
  ::-webkit-scrollbar { width:6px; } ::-webkit-scrollbar-track { background:#f1f5f9; } ::-webkit-scrollbar-thumb { background:#cbd5e1; border-radius:3px; }
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen" class="min-h-screen flex items-center justify-center">
  <div class="bg-white rounded-2xl shadow-lg p-8 w-full max-w-sm text-center">
    <div class="text-3xl mb-2">🎓</div>
    <div class="font-bold text-xl text-slate-800 mb-1">Allite Admin</div>
    <div class="text-sm text-slate-400 mb-6">Log in with your admin account</div>
    <button onclick="loginGoogle()" class="w-full flex items-center justify-center gap-3 border-2 border-slate-200 hover:border-slate-300 rounded-xl py-2.5 px-4 text-sm font-semibold text-slate-700 transition mb-3">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Continue with Google
    </button>
    <div id="login-err" class="text-xs text-red-500 mt-2 hidden"></div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app" class="hidden min-h-screen">

  <!-- TOP BAR -->
  <div class="bg-white border-b border-slate-200 px-5 py-3 flex items-center justify-between sticky top-0 z-20">
    <div class="flex items-center gap-3">
      <div class="w-7 h-7 bg-indigo-600 rounded-lg flex items-center justify-center text-white text-xs font-bold">A</div>
      <span class="font-bold text-slate-800">Allite Admin</span>
    </div>
    <div class="flex items-center gap-3">
      <a href="index.html" target="_blank" class="text-xs text-slate-400 hover:text-slate-600">← Lihat web</a>
      <div class="text-xs text-slate-500" id="admin-email"></div>
      <button onclick="logout()" class="text-xs text-slate-400 hover:text-red-500 transition">Log out</button>
    </div>
  </div>

  <!-- MAIN TABS -->
  <div class="bg-white border-b border-slate-200 px-5 flex gap-1">
    <button onclick="mainTab('content')" id="mt-content" class="tab-active px-4 py-3 text-sm transition">📚 Content</button>
    <button onclick="mainTab('members')" id="mt-members" class="tab-idle px-4 py-3 text-sm transition">👥 Members</button>
    <button onclick="mainTab('orders')"  id="mt-orders"  class="tab-idle px-4 py-3 text-sm transition">📦 Orders</button>
  </div>

  <!-- CONTENT TAB -->
  <div id="sec-content" class="max-w-5xl mx-auto px-4 py-5">
    <!-- Sub-tabs -->
    <div class="flex gap-1 mb-5 bg-white rounded-xl p-1 border border-slate-200 w-fit">
      <button onclick="subTab('papers')"     id="st-papers"     class="sub-active  text-xs px-3 py-1.5 rounded-lg transition">📄 Trial Papers</button>
      <button onclick="subTab('notes')"      id="st-notes"      class="sub-idle    text-xs px-3 py-1.5 rounded-lg transition">📝 Notes/Guides</button>
      <button onclick="subTab('collection')" id="st-collection" class="sub-idle    text-xs px-3 py-1.5 rounded-lg transition">📦 Collection</button>
      <button onclick="subTab('books')"      id="st-books"      class="sub-idle    text-xs px-3 py-1.5 rounded-lg transition">📚 Books</button>
    </div>

    <!-- Filters + Add -->
    <div class="flex items-center gap-2 mb-4 flex-wrap">
      <select id="filter-subject" class="field w-auto" onchange="loadContent()">
        <option value="">All Subjects</option>
      </select>
      <select id="filter-year" class="field w-auto" onchange="loadContent()">
        <option value="">All Years</option>
        <option>2025</option><option>2024</option><option>2023</option><option>2022</option><option>2021</option>
      </select>
      <button onclick="openModal()" class="ml-auto bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-semibold px-4 py-2 rounded-xl transition">+ Add</button>
    </div>

    <!-- Content List -->
    <div id="content-list" class="space-y-2"></div>
  </div>

  <!-- MEMBERS TAB -->
  <div id="sec-members" class="hidden max-w-5xl mx-auto px-4 py-5">
    <div class="flex items-center justify-between mb-4">
      <div class="font-semibold text-slate-700">Registered Students</div>
      <input type="text" placeholder="Search email/name/school..." id="member-search" class="field w-64" oninput="filterMembers()">
    </div>
    <div class="bg-white rounded-2xl border border-slate-200 overflow-hidden">
      <table class="w-full text-sm">
        <thead class="bg-slate-50 border-b border-slate-200">
          <tr class="text-xs text-slate-500 uppercase">
            <th class="px-4 py-3 text-left">Email</th>
            <th class="px-4 py-3 text-left">Name</th>
            <th class="px-4 py-3 text-left">Phone</th>
            <th class="px-4 py-3 text-left">School</th>
            <th class="px-4 py-3 text-left">Joined</th>
            <th class="px-4 py-3 text-left">Premium</th>
          </tr>
        </thead>
        <tbody id="members-body" class="divide-y divide-slate-100"></tbody>
      </table>
      <div id="members-empty" class="text-center text-slate-400 py-12 text-sm">No members yet</div>
    </div>
  </div>

  <!-- ORDERS TAB -->
  <div id="sec-orders" class="hidden max-w-5xl mx-auto px-4 py-5">
    <div class="font-semibold text-slate-700 mb-4">Orders</div>
    <div class="bg-white rounded-2xl border border-slate-200 overflow-hidden">
      <table class="w-full text-sm">
        <thead class="bg-slate-50 border-b border-slate-200">
          <tr class="text-xs text-slate-500 uppercase">
            <th class="px-4 py-3 text-left">Date</th>
            <th class="px-4 py-3 text-left">Name</th>
            <th class="px-4 py-3 text-left">Phone</th>
            <th class="px-4 py-3 text-left">Items</th>
            <th class="px-4 py-3 text-left">Total</th>
            <th class="px-4 py-3 text-left">Status</th>
          </tr>
        </thead>
        <tbody id="orders-body" class="divide-y divide-slate-100"></tbody>
      </table>
      <div id="orders-empty" class="text-center text-slate-400 py-12 text-sm">No orders yet</div>
    </div>
  </div>

</div>

<!-- ADD/EDIT MODAL -->
<div id="modal" class="hidden modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal-box">
    <div class="p-5 border-b border-slate-100 flex items-center justify-between sticky top-0 bg-white rounded-t-2xl">
      <div class="font-bold text-slate-800" id="modal-title">Add Content</div>
      <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600 text-xl w-8 h-8 flex items-center justify-center">×</button>
    </div>
    <div class="p-5 space-y-4" id="modal-body"></div>
    <div class="p-5 border-t border-slate-100 flex gap-3 justify-end">
      <button onclick="closeModal()" class="text-slate-500 text-sm px-4 py-2">Cancel</button>
      <button id="modal-delete-btn" onclick="deleteContent()" class="hidden text-red-500 hover:text-red-700 text-sm px-4 py-2">Delete</button>
      <button onclick="saveContent()" class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-semibold px-5 py-2 rounded-xl transition">Save</button>
    </div>
  </div>
</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, doc, getDocs, getDoc, addDoc, setDoc, updateDoc, deleteDoc, query, where, orderBy, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDvByIOc0HV6tOaighb44A9UIQmZ46mjOA",
  authDomain: "allite-platform.firebaseapp.com",
  projectId: "allite-platform",
  storageBucket: "allite-platform.firebasestorage.app",
  messagingSenderId: "989451608043",
  appId: "1:989451608043:web:c33de8fdcc3383dbc6c3ae"
};

const ADMIN_EMAIL = 'sgece88@gmail.com';
const SUBJECTS = ['BM','BI','Math','Add Math','Sejarah','Biology','Chemistry','Physics','P.Islam','Moral','Sains','Ekonomi','P.Akaun','Geografi'];
const STATES = ['Johor Bahru','Kota Tinggi','Batu Pahat','Kulai','Muar','Segamat','Pasir Gudang','Kluang','Kedah','Kelantan','Melaka','Negeri Sembilan','Pahang','Perak','Perlis','Pulau Pinang','Sabah','Sarawak','Selangor','Terengganu','WP KL','WP Putrajaya','MRSM','S1','SABK','SMKA','SPMU','YIK','Kebangsaan'];

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);

let currentUser = null;
let currentTab  = 'papers';
let editingId   = null;
let allMembers  = [];

// ── AUTH ──────────────────────────────────────────────────────────
window.loginGoogle = () => signInWithPopup(auth, new GoogleAuthProvider()).catch(e => {
  document.getElementById('login-err').textContent = e.message;
  document.getElementById('login-err').classList.remove('hidden');
});

window.logout = () => signOut(auth);

onAuthStateChanged(auth, user => {
  if (user && user.email === ADMIN_EMAIL) {
    currentUser = user;
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    document.getElementById('admin-email').textContent = user.email;
    populateSubjectFilter();
    loadContent();
  } else if (user) {
    signOut(auth);
    document.getElementById('login-err').textContent = 'This account does not have admin access.';
    document.getElementById('login-err').classList.remove('hidden');
  } else {
    document.getElementById('login-screen').classList.remove('hidden');
    document.getElementById('app').classList.add('hidden');
  }
});

// ── TABS ──────────────────────────────────────────────────────────
window.mainTab = (tab) => {
  ['content','members','orders'].forEach(t => {
    document.getElementById('sec-'+t).classList.toggle('hidden', t!==tab);
    const btn = document.getElementById('mt-'+t);
    btn.className = t===tab ? 'tab-active px-4 py-3 text-sm transition' : 'tab-idle px-4 py-3 text-sm transition';
  });
  if (tab==='members') loadMembers();
  if (tab==='orders')  loadOrders();
};

window.subTab = (tab) => {
  currentTab = tab;
  ['papers','notes','collection','books'].forEach(t => {
    const btn = document.getElementById('st-'+t);
    btn.className = t===tab
      ? 'sub-active text-xs px-3 py-1.5 rounded-lg transition'
      : 'sub-idle text-xs px-3 py-1.5 rounded-lg transition';
  });
  // Show/hide year filter (not needed for books/collection)
  document.getElementById('filter-year').classList.toggle('hidden', tab==='books');
  loadContent();
};

// ── SUBJECT FILTER ────────────────────────────────────────────────
function populateSubjectFilter() {
  const sel = document.getElementById('filter-subject');
  SUBJECTS.forEach(s => { const o=document.createElement('option'); o.value=s; o.textContent=s; sel.appendChild(o); });
}

// ── LOAD CONTENT ──────────────────────────────────────────────────
window.loadContent = async () => {
  const subject = document.getElementById('filter-subject').value;
  const year    = document.getElementById('filter-year').value;
  const list    = document.getElementById('content-list');
  list.innerHTML = '<div class="text-slate-400 text-sm py-8 text-center">Loading...</div>';

  let q = query(collection(db,'content'), where('type','==',currentTab));
  const snap = await getDocs(q);
  let docs = snap.docs.map(d => ({id:d.id, ...d.data()}));

  if (subject) docs = docs.filter(d => d.subject===subject);
  if (year)    docs = docs.filter(d => String(d.year)===year);
  docs.sort((a,b) => (b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));

  if (!docs.length) { list.innerHTML = '<div class="text-slate-400 text-sm py-8 text-center">No items yet. Click + Add to create one.</div>'; return; }

  list.innerHTML = docs.map(d => renderRow(d)).join('');
};

function renderRow(d) {
  const accessBadge = d.access==='members'
    ? '<span class="badge-members text-xs px-2 py-0.5 rounded-full">🔒 Members</span>'
    : '<span class="badge-free text-xs px-2 py-0.5 rounded-full">🆓 Free</span>';
  const statusBadge = d.active
    ? '<span class="badge-active text-xs px-2 py-0.5 rounded-full">● Active</span>'
    : '<span class="badge-off text-xs px-2 py-0.5 rounded-full">○ Off</span>';

  const meta = currentTab==='papers' || currentTab==='notes'
    ? `<span class="text-slate-400">${d.subject||''} · ${d.year||''} ${d.state ? '· '+d.state : ''} ${d.kertas ? '· K'+d.kertas : ''}</span>`
    : `<span class="text-slate-400">${d.subject||''} ${d.year ? '· '+d.year : ''}</span>`;

  const img = d.imageUrl
    ? `<img src="${d.imageUrl}" class="thumb mr-3 shrink-0">`
    : `<div class="w-10 h-10 bg-slate-100 rounded-lg mr-3 shrink-0 flex items-center justify-center text-slate-300 text-lg">${currentTab==='books'?'📚':'📄'}</div>`;

  return `<div class="bg-white rounded-xl border border-slate-200 p-4 flex items-center gap-3 hover:border-indigo-200 transition">
    ${img}
    <div class="flex-1 min-w-0">
      <div class="font-semibold text-slate-700 text-sm truncate">${d.title||'Untitled'}</div>
      <div class="text-xs mt-0.5 flex flex-wrap gap-1 items-center">${meta}</div>
    </div>
    <div class="flex items-center gap-2 shrink-0">
      ${accessBadge} ${statusBadge}
      <button onclick="openModal('${d.id}')" class="text-slate-400 hover:text-indigo-600 text-sm px-2 py-1 rounded-lg hover:bg-indigo-50 transition">Edit</button>
    </div>
  </div>`;
}

// ── MODAL ─────────────────────────────────────────────────────────
window.openModal = async (id=null) => {
  editingId = id;
  let data = { type:currentTab, subject:'', year:new Date().getFullYear(), state:'', kertas:'1',
    title:'', description:'', url:'', quizFile:'', imageUrl:'', price:1.99, access:'free', active:true };

  if (id) {
    const snap = await getDoc(doc(db,'content',id));
    if (snap.exists()) data = {id:snap.id, ...snap.data()};
  }

  document.getElementById('modal-title').textContent = id ? 'Edit Content' : 'Add Content';
  document.getElementById('modal-delete-btn').classList.toggle('hidden', !id);
  document.getElementById('modal-body').innerHTML = buildForm(data);
  document.getElementById('modal').classList.remove('hidden');
  document.addEventListener('paste', handlePasteImg);
};

window.closeModal = () => {
  document.getElementById('modal').classList.add('hidden');
  document.removeEventListener('paste', handlePasteImg);
  editingId = null;
};

function buildForm(d) {
  const isPaperNote = d.type==='papers' || d.type==='notes';
  const isBook = d.type==='books';
  const isColl = d.type==='collection';

  const subjectOpts = SUBJECTS.map(s=>`<option ${d.subject===s?'selected':''}>${s}</option>`).join('');
  const stateOpts   = STATES.map(s=>`<option ${d.state===s?'selected':''}>${s}</option>`).join('');

  const imgSection = `
    <div>
      <label class="text-xs font-semibold text-slate-500 uppercase block mb-1">Image / Cover</label>
      ${d.imageUrl ? `<img src="${d.imageUrl}" id="img-preview" class="thumb mb-2">` : `<img id="img-preview" class="thumb mb-2 hidden">`}
      <div class="paste-zone text-xs text-slate-400" ondragover="event.preventDefault()" ondrop="handleDropImg(event)">
        📋 Paste (Cmd+V), drag & drop, or
        <label class="text-indigo-500 font-semibold cursor-pointer hover:underline ml-1">
          choose file<input type="file" accept="image/*" class="hidden" onchange="handleFileImg(this)">
        </label>
      </div>
      <input type="hidden" id="f-imageUrl" value="${d.imageUrl||''}">
    </div>`;

  return `
    <div class="grid grid-cols-2 gap-3">
      <div>
        <label class="text-xs font-semibold text-slate-500 uppercase block mb-1">Subject *</label>
        <select class="field" id="f-subject"><option value="">Select...</option>${subjectOpts}</select>
      </div>
      ${isPaperNote ? `
      <div>
        <label class="text-xs font-semibold text-slate-500 uppercase block mb-1">Year</label>
        <input class="field" type="number" id="f-year" value="${d.year||''}">
      </div>` : `
      <div>
        <label class="text-xs font-semibold text-slate-500 uppercase block mb-1">Year</label>
        <input class="field" type="number" id="f-year" value="${d.year||''}">
      </div>`}
    </div>

    ${isPaperNote ? `
    <div class="grid grid-cols-2 gap-3">
      <div>
        <label class="text-xs font-semibold text-slate-500 uppercase block mb-1">State</label>
        <select class="field" id="f-state"><option value="">Select / N/A</option>${stateOpts}</select>
      </div>
      <div>
        <label class="text-xs font-semibold text-slate-500 uppercase block mb-1">Kertas</label>
        <select class="field" id="f-kertas">
          <option ${d.kertas=='1'?'selected':''}>1</option>
          <option ${d.kertas=='2'?'selected':''}>2</option>
          <option ${d.kertas=='1&2'?'selected':''}>1&2</option>
        </select>
      </div>
    </div>` : ''}

    <div>
      <label class="text-xs font-semibold text-slate-500 uppercase block mb-1">Title *</label>
      <input class="field" type="text" id="f-title" value="${escAttr(d.title||'')}">
    </div>

    ${isBook ? `
    <div>
      <label class="text-xs font-semibold text-slate-500 uppercase block mb-1">Description</label>
      <textarea class="field" rows="3" id="f-description">${d.description||''}</textarea>
    </div>` : ''}

    ${isPaperNote ? `
    <div>
      <label class="text-xs font-semibold text-slate-500 uppercase block mb-1">Drive URL (view only)</label>
      <input class="field" type="text" id="f-url" placeholder="https://drive.google.com/file/d/..." value="${escAttr(d.url||'')}">
    </div>
    <div>
      <label class="text-xs font-semibold text-slate-500 uppercase block mb-1">Quiz JSON filename (optional)</label>
      <input class="field" type="text" id="f-quizFile" placeholder="quiz_2025_kedah_k1.json" value="${escAttr(d.quizFile||'')}">
    </div>` : `
    <div>
      <label class="text-xs font-semibold text-slate-500 uppercase block mb-1">Drive URL</label>
      <input class="field" type="text" id="f-url" placeholder="https://drive.google.com/file/d/..." value="${escAttr(d.url||'')}">
    </div>`}

    ${isColl || isBook ? `
    <div>
      <label class="text-xs font-semibold text-slate-500 uppercase block mb-1">Price (RM)</label>
      <input class="field" type="number" step="0.01" id="f-price" value="${d.price||1.99}">
    </div>` : ''}

    ${isBook ? imgSection : ''}
    ${isColl ? imgSection : ''}

    <div class="grid grid-cols-2 gap-4 pt-2">
      <div>
        <div class="text-xs font-semibold text-slate-500 uppercase mb-2">Access</div>
        <div class="flex gap-3">
          <label class="flex items-center gap-1.5 text-sm cursor-pointer">
            <input type="radio" name="r-access" value="free" ${d.access!=='members'?'checked':''}>
            <span>🆓 Free</span>
          </label>
          <label class="flex items-center gap-1.5 text-sm cursor-pointer">
            <input type="radio" name="r-access" value="members" ${d.access==='members'?'checked':''}>
            <span>🔒 Members</span>
          </label>
        </div>
      </div>
      <div>
        <div class="text-xs font-semibold text-slate-500 uppercase mb-2">Status</div>
        <label class="toggle">
          <input type="checkbox" id="f-active" ${d.active?'checked':''}>
          <span class="slider"></span>
        </label>
        <span class="text-xs text-slate-400 ml-2">Active</span>
      </div>
    </div>`;
}

// ── IMAGE HANDLING ─────────────────────────────────────────────────
function handlePasteImg(e) {
  for (const item of (e.clipboardData?.items||[])) {
    if (item.type.startsWith('image/')) { readImg(item.getAsFile()); break; }
  }
}
window.handleDropImg = (e) => {
  e.preventDefault();
  const f = e.dataTransfer.files[0];
  if (f?.type.startsWith('image/')) readImg(f);
};
window.handleFileImg = (input) => { if (input.files[0]) readImg(input.files[0]); };

function readImg(file) {
  const reader = new FileReader();
  reader.onload = e => {
    const src = e.target.result;
    const prev = document.getElementById('img-preview');
    if (prev) { prev.src=src; prev.classList.remove('hidden'); }
    const inp = document.getElementById('f-imageUrl');
    if (inp) inp.value = src;
  };
  reader.readAsDataURL(file);
}

// ── SAVE CONTENT ──────────────────────────────────────────────────
window.saveContent = async () => {
  const get = id => document.getElementById(id);
  const data = {
    type:     currentTab,
    subject:  get('f-subject')?.value || '',
    year:     parseInt(get('f-year')?.value) || null,
    state:    get('f-state')?.value || '',
    kertas:   get('f-kertas')?.value || '',
    title:    get('f-title')?.value.trim() || '',
    description: get('f-description')?.value || '',
    url:      get('f-url')?.value.trim() || '',
    quizFile: get('f-quizFile')?.value.trim() || '',
    imageUrl: get('f-imageUrl')?.value || '',
    price:    parseFloat(get('f-price')?.value) || 0,
    access:   document.querySelector('input[name="r-access"]:checked')?.value || 'free',
    active:   get('f-active')?.checked ?? true,
  };

  if (!data.title || !data.subject) { alert('Title and Subject are required.'); return; }

  try {
    if (editingId) {
      await updateDoc(doc(db,'content',editingId), data);
    } else {
      data.createdAt = serverTimestamp();
      await addDoc(collection(db,'content'), data);
    }
    closeModal();
    loadContent();
  } catch(e) { alert('Error: '+e.message); }
};

window.deleteContent = async () => {
  if (!editingId || !confirm('Delete this item?')) return;
  await deleteDoc(doc(db,'content',editingId));
  closeModal();
  loadContent();
};

// ── MEMBERS ───────────────────────────────────────────────────────
window.loadMembers = async () => {
  const snap = await getDocs(collection(db,'users'));
  allMembers = snap.docs.map(d => ({id:d.id,...d.data()}));
  renderMembers(allMembers);
};

window.filterMembers = () => {
  const q = document.getElementById('member-search').value.toLowerCase();
  renderMembers(allMembers.filter(m =>
    (m.email||'').toLowerCase().includes(q) ||
    (m.name||'').toLowerCase().includes(q) ||
    (m.school||'').toLowerCase().includes(q)
  ));
};

function renderMembers(list) {
  const body = document.getElementById('members-body');
  document.getElementById('members-empty').classList.toggle('hidden', list.length>0);
  body.innerHTML = list.map(m => `
    <tr class="hover:bg-slate-50">
      <td class="px-4 py-3 text-xs text-slate-600">${m.email||'-'}</td>
      <td class="px-4 py-3 text-xs">${m.name||'-'}</td>
      <td class="px-4 py-3 text-xs">${m.phone||'-'}</td>
      <td class="px-4 py-3 text-xs">${m.school||'-'}</td>
      <td class="px-4 py-3 text-xs text-slate-400">${m.createdAt?.toDate ? m.createdAt.toDate().toLocaleDateString() : '-'}</td>
      <td class="px-4 py-3">${m.isPremium ? '<span class="text-xs bg-amber-100 text-amber-700 px-2 py-0.5 rounded-full">⭐ Premium</span>' : '<span class="text-xs text-slate-400">Free</span>'}</td>
    </tr>`).join('');
}

// ── ORDERS ────────────────────────────────────────────────────────
window.loadOrders = async () => {
  const snap = await getDocs(query(collection(db,'orders'), orderBy('createdAt','desc')));
  const orders = snap.docs.map(d => ({id:d.id,...d.data()}));
  const body = document.getElementById('orders-body');
  document.getElementById('orders-empty').classList.toggle('hidden', orders.length>0);
  body.innerHTML = orders.map(o => `
    <tr class="hover:bg-slate-50">
      <td class="px-4 py-3 text-xs text-slate-400">${o.createdAt?.toDate ? o.createdAt.toDate().toLocaleDateString() : '-'}</td>
      <td class="px-4 py-3 text-xs font-medium">${o.name||'-'}</td>
      <td class="px-4 py-3 text-xs">${o.phone||'-'}</td>
      <td class="px-4 py-3 text-xs text-slate-600 max-w-xs truncate">${(o.items||[]).map(i=>i.title||i).join(', ')||'-'}</td>
      <td class="px-4 py-3 text-xs font-semibold">RM${(o.total||0).toFixed(2)}</td>
      <td class="px-4 py-3"><span class="text-xs px-2 py-0.5 rounded-full ${o.status==='paid'?'bg-green-100 text-green-700':'bg-amber-100 text-amber-700'}">${o.status||'pending'}</span></td>
    </tr>`).join('');
};

// ── UTILS ──────────────────────────────────────────────────────────
function escAttr(s) { return String(s).replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

</script>
</body>
